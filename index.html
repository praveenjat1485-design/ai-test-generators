<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultra-Fast AI Test Master</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #1e3799; --success: #27ae60; --danger: #e74c3c; --bg: #f5f6fa; --card: #ffffff; --text: #333; }
        body.dark-mode { --bg: #1a1a2e; --card: #16213e; --text: #f5f6fa; --primary: #0f3460; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); position: relative; }
        .card-upload { border: 3px dashed #3498db; padding: 30px; border-radius: 15px; text-align: center; background: rgba(52, 152, 219, 0.05); cursor: pointer; }
        .loader-box { margin-top: 20px; padding: 15px; background: #eee; border-radius: 10px; display: none; }
        .progress-fill { height: 10px; background: var(--success); width: 0%; border-radius: 5px; transition: 0.3s; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; transition: 0.3s; }
        .btn-start { background: var(--primary); color: white; margin-top: 15px; }
        .test-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.05); padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; }
        .opt { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; text-align: left; background: var(--card); color: var(--text); font-size: 17px; }
        .correct { background: #d4edda !important; color: #155724; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; color: #721c24; border-color: #dc3545 !important; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div style="text-align:right;"><button class="btn" style="width:auto; padding:5px 15px; font-size:12px;" onclick="toggleTheme()">🌓 Mode</button></div>
    <h1 style="text-align:center;">⚡ Ultra-Fast AI Exam</h1>

    <div id="dashboard">
        <input type="text" id="studentName" style="width:100%; padding:12px; margin-bottom:15px; border-radius:8px; border:1px solid #ddd;" placeholder="अपना नाम लिखें...">
        
        <div class="card-upload" onclick="document.getElementById('fileInput').click()">
            <h2 style="margin:0;">📸 एक साथ कई फोटो चुनें</h2>
            <p>10-20 फोटो एक साथ डालें, यह अब तेज़ काम करेगा!</p>
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
        </div>

        <div id="loader" class="loader-box">
            <p id="status">AI प्रोसेसिंग शुरू हो रही है...</p>
            <div style="background:#ddd; border-radius:5px;"><div id="progress" class="progress-fill"></div></div>
        </div>

        <div style="margin-top:20px;">
            <h3>📁 सेव किए गए टेस्ट</h3>
            <div id="saved-list"></div>
        </div>
    </div>

    <div id="quiz-area" class="hidden">
        <h3 id="test-title">Test</h3>
        <p>स्कोर: <b id="live-score">0</b></p>
        <div class="opt-card">
            <h2 id="q-text">Sawal...</h2>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result-area" class="hidden" style="text-align:center;">
        <h1 id="greet">बधाई हो!</h1>
        <h1 id="final-score" style="font-size:60px; color:var(--success);">0</h1>
        <button class="btn btn-start" onclick="location.reload()">वापस जाएँ</button>
    </div>
</div>

<script>
    let currentQuestions = [];
    let currentIdx = 0, score = 0;

    function toggleTheme() { document.body.classList.toggle('dark-mode'); }

    async function processImages(files) {
        const loader = document.getElementById('loader');
        const status = document.getElementById('status');
        const bar = document.getElementById('progress');
        loader.style.display = 'block';

        let allExtracted = [];
        
        // Tesseract Worker Setup (Speed Boost)
        const worker = await Tesseract.createWorker({
            logger: m => { if(m.status === 'recognizing text') status.innerText = `स्कैनिंग: ${(m.progress*100).toFixed(0)}%`; }
        });
        await worker.loadLanguage('hin+eng');
        await worker.initialize('hin+eng');

        for (let i = 0; i < files.length; i++) {
            status.innerText = `पेज ${i+1}/${files.length} पढ़ा जा रहा है...`;
            bar.style.width = ((i+1)/files.length * 100) + "%";
            
            const { data: { text } } = await worker.recognize(files[i]);
            const parsed = parseText(text);
            allExtracted = allExtracted.concat(parsed);
        }

        await worker.terminate();

        if(allExtracted.length > 0) {
            saveAndReload(allExtracted);
        } else {
            alert("फोटो साफ़ नहीं थी, फिर से कोशिश करें।");
            location.reload();
        }
    }

    function parseText(text) {
        const lines = text.split('\n').filter(l => l.trim().length > 10);
        let qs = [];
        for(let i=0; i<lines.length; i++) {
            if(lines[i].includes('?') || lines[i].length > 25) {
                qs.push({ t: lines[i], o: [lines[i+1], lines[i+2], lines[i+3], lines[i+4]].filter(x => x), a: lines[i+1] });
                i += 4;
            }
        }
        return qs;
    }

    function saveAndReload(data) {
        const tests = JSON.parse(localStorage.getItem('ultraTests') || '[]');
        tests.push({ name: "Test " + (tests.length + 1), data: data });
        localStorage.setItem('ultraTests', JSON.stringify(tests));
        location.reload();
    }

    document.getElementById('fileInput').onchange = e => processImages(e.target.files);

    function startTest(i) {
        const tests = JSON.parse(localStorage.getItem('ultraTests') || '[]');
        currentQuestions = tests[i].data;
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('quiz-area').classList.remove('hidden');
        loadQ();
    }

    function loadQ() {
        const q = currentQuestions[currentIdx];
        document.getElementById('q-text').innerText = `${currentIdx+1}. ${q.t}`;
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        q.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt'; b.innerText = opt;
            b.onclick = () => {
                if(opt === q.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); }
                setTimeout(() => {
                    currentIdx++;
                    if(currentIdx < currentQuestions.length) loadQ();
                    else showResult();
                }, 1000);
                document.getElementById('live-score').innerText = score;
            };
            box.appendChild(b);
        });
    }

    function showResult() {
        document.getElementById('quiz-area').classList.add('hidden');
        document.getElementById('result-area').classList.remove('hidden');
        document.getElementById('greet').innerText = "शानदार, " + document.getElementById('studentName').value;
        document.getElementById('final-score').innerText = score + " / " + currentQuestions.length;
    }

    function displayTests() {
        const list = document.getElementById('saved-list');
        const tests = JSON.parse(localStorage.getItem('ultraTests') || '[]');
        list.innerHTML = tests.map((t, i) => `
            <div class="test-item">
                <span><b>${t.name}</b> (${t.data.length} प्रश्न)</span>
                <button class="btn" style="width:auto; background:var(--success); color:white;" onclick="startTest(${i})">शुरू करें</button>
            </div>
        `).join('');
    }
    
    displayTests();
</script>
</body>
</html>
