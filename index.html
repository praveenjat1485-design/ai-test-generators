<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Permanent AI Quiz Master</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { --primary: #2980b9; --success: #27ae60; --dark: #2c3e50; --text: #333; --bg: #f4f7f6; }
        body.dark { --bg: #1a1a2e; --text: #ecf0f1; --primary: #3498db; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); transition: 0.3s; margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: auto; background: var(--card-bg, white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .card { background: white; padding: 20px; border-radius: 15px; border: 1px solid #ddd; margin-bottom: 20px; color: #333; }
        .btn { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; width: 100%; margin: 5px 0; transition: 0.2s; }
        .btn-blue { background: var(--primary); color: white; }
        .btn-green { background: var(--success); color: white; }
        .hidden { display: none; }
        .test-box { border-left: 5px solid var(--primary); padding: 10px; background: #fff; margin: 10px 0; display: flex; justify-content: space-between; align-items: center; color: #333; }
        .progress-bar { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin: 10px 0; }
        .fill { height: 100%; background: var(--success); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center;">🛡️ Permanent AI Quiz</h1>
    
    <div id="home">
        <div class="card">
            <h3>Naya Test Scan Karein</h3>
            <input type="file" id="files" multiple accept="image/*" class="hidden">
            <button class="btn btn-blue" onclick="document.getElementById('files').click()">+ Photos Upload Karein</button>
            <div id="loader" class="hidden">
                <p id="status">Taiyari ho rahi hai...</p>
                <div class="progress-bar"><div id="bar" class="fill"></div></div>
            </div>
        </div>

        <h3>Aapki Library (Saved Data)</h3>
        <div id="library">Loading...</div>
        <button class="btn" style="background:#e74c3c; color:white; margin-top:20px;" onclick="clearAll()">Saara Data Delete Karein</button>
    </div>

    <div id="quiz" class="hidden">
        <h2 id="q-text">Sawal loading...</h2>
        <div id="options"></div>
        <p>Score: <b id="score">0</b></p>
        <button class="btn" onclick="exitQuiz()">Exit (Auto-Save Score)</button>
    </div>
</div>

<script>
    let currentTest = [];
    let qIdx = 0;
    let score = 0;

    // 1. Data Save Karne Ka Function
    function saveData(key, data) {
        localStorage.setItem(key, JSON.stringify(data));
    }

    // 2. Data Load Karne Ka Function
    function loadData(key) {
        return JSON.parse(localStorage.getItem(key)) || [];
    }

    // Dashboard Load
    function showLibrary() {
        const tests = loadData('my_ai_tests');
        const lib = document.getElementById('library');
        if(tests.length === 0) { lib.innerHTML = "Koi test nahi hai."; return; }
        
        lib.innerHTML = tests.map((t, i) => `
            <div class="test-box">
                <span><b>${t.name}</b> (${t.questions.length} Qs)</span>
                <button onclick="startTest(${i})" style="padding:5px 10px; background:#27ae60; color:white; border:none; border-radius:5px;">Start</button>
            </div>
        `).join('');
    }

    // Photo Scan with Auto-Save
    document.getElementById('files').onchange = async (e) => {
        const files = e.target.files;
        document.getElementById('loader').classList.remove('hidden');
        const worker = await Tesseract.createWorker();
        await worker.loadLanguage('hin+eng');
        await worker.initialize('hin+eng');

        let newQs = [];
        for(let i=0; i<files.length; i++) {
            document.getElementById('status').innerText = `Scanning Page ${i+1}...`;
            document.getElementById('bar').style.width = ((i+1)/files.length * 100) + "%";
            const { data: { text } } = await worker.recognize(files[i]);
            
            // Extract Logic
            const lines = text.split('\n').filter(l => l.length > 15);
            for(let j=0; j<lines.length; j++) {
                if(lines[j].includes('?') || lines[j].length > 30) {
                    newQs.push({ q: lines[j], opts: [lines[j+1], lines[j+2], lines[j+3]].filter(x => x), a: lines[j+1] });
                    j += 3;
                }
            }
        }
        
        if(newQs.length > 0) {
            let tests = loadData('my_ai_tests');
            tests.push({ name: "Test " + (tests.length + 1), questions: newQs });
            saveData('my_ai_tests', tests); // Permanent Save
            location.reload(); 
        }
        await worker.terminate();
    };

    function startTest(i) {
        const tests = loadData('my_ai_tests');
        currentTest = tests[i].questions;
        document.getElementById('home').classList.add('hidden');
        document.getElementById('quiz').classList.remove('hidden');
        renderQ();
    }

    function renderQ() {
        const data = currentTest[qIdx];
        document.getElementById('q-text').innerText = `${qIdx+1}. ${data.q}`;
        const box = document.getElementById('options');
        box.innerHTML = "";
        data.opts.forEach(o => {
            const b = document.createElement('button');
            b.className = 'btn'; b.style.background = "#fff"; b.style.color = "#333"; b.style.border = "1px solid #ddd";
            b.innerText = o;
            b.onclick = () => {
                if(o === data.a) score++;
                qIdx++;
                if(qIdx < currentTest.length) renderQ();
                else { alert("Test Khatam! Score: " + score); location.reload(); }
                document.getElementById('score').innerText = score;
            };
            box.appendChild(b);
        });
    }

    function clearAll() {
        if(confirm("Kya aap saara data delete karna chahte hain?")) {
            localStorage.clear();
            location.reload();
        }
    }

    function exitQuiz() { location.reload(); }

    showLibrary();
</script>
</body>
            </html>
