<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Exam Master Pro - प्रवीण</title>
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    <style>
        :root { 
            --primary: #1e3799; --success: #27ae60; --danger: #e74c3c; 
            --bg: #f5f6fa; --card: #ffffff; --text: #333333;
        }
        /* डार्क मोड कलर्स */
        body.dark-mode { 
            --bg: #1a1a2e; --card: #16213e; --text: #e94560; --primary: #0f3460;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 15px; transition: 0.3s; }
        .container { max-width: 800px; margin: auto; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 40px rgba(0,0,0,0.1); position: relative; }
        
        .header-controls { position: absolute; top: 15px; right: 15px; display: flex; gap: 10px; }
        .card { border: 2px dashed #ddd; padding: 30px; border-radius: 15px; text-align: center; margin-bottom: 20px; background: var(--card); }
        .saved-tests { text-align: left; margin-top: 20px; border-top: 2px solid #eee; padding-top: 20px; }
        .test-item { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.05); padding: 12px; margin: 8px 0; border-radius: 10px; }
        
        .input-name { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn { padding: 12px 25px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-primary { background: #1e3799; color: white; width: 100%; }
        .btn-theme { background: #555; color: white; padding: 5px 15px; font-size: 12px; }
        
        .opt { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 12px; cursor: pointer; text-align: left; background: var(--card); color: var(--text); font-size: 17px; }
        .correct { background: #d4edda !important; color: #155724; border-color: #28a745 !important; }
        .wrong { background: #f8d7da !important; color: #721c24; border-color: #dc3545 !important; }
        
        .progress-container { height: 8px; background: #eee; border-radius: 4px; margin: 15px 0; overflow: hidden; }
        .progress-bar { height: 100%; background: #27ae60; width: 0%; transition: 0.4s; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="container">
    <div class="header-controls">
        <button class="btn btn-theme" onclick="toggleDarkMode()">🌓 Mode</button>
    </div>

    <h1 style="text-align:center; margin-top:0;">🚀 AI Exam Portal</h1>

    <div id="dashboard">
        <input type="text" id="userName" class="input-name" placeholder="अपना नाम यहाँ लिखें..." value="Student">
        
        <div class="card" onclick="document.getElementById('fileInput').click()">
            <h2 style="margin:0;">📸 नया टेस्ट स्कैन करें</h2>
            <p>फोटो अपलोड करके टेस्ट बनाएँ</p>
            <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
        </div>
        
        <div id="loader" class="hidden">
            <p id="status-text">AI पढ़ रहा है...</p>
            <div class="progress-container"><div id="load-progress" class="progress-bar"></div></div>
        </div>

        <div class="saved-tests">
            <h3>📁 आपके टेस्ट लाइब्रेरी</h3>
            <div id="saved-list"></div>
        </div>
    </div>

    <div id="quiz-screen" class="hidden">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <b id="test-title">Test</b>
            <span id="score-display">स्कोर: 0</span>
        </div>
        <div class="progress-container"><div id="quiz-progress" class="progress-bar"></div></div>
        
        <div class="q-card">
            <h3 id="q-text">Sawal...</h3>
            <div id="options-box"></div>
        </div>
    </div>

    <div id="result-screen" class="hidden" style="text-align:center;">
        <h1 id="user-greeting">बधाई हो!</h1>
        <h2>आपका स्कोर कार्ड</h2>
        <h1 id="final-score" style="font-size:60px; color:#27ae60;">0</h1>
        <button class="btn btn-primary" onclick="location.reload()">वापस जाएँ</button>
    </div>
</div>

<script>
    let currentQuestions = [];
    let currentIdx = 0;
    let score = 0;

    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
    }

    if(localStorage.getItem('theme') === 'dark') document.body.classList.add('dark-mode');

    function displaySavedTests() {
        const list = document.getElementById('saved-list');
        const tests = JSON.parse(localStorage.getItem('myTests') || '[]');
        if(tests.length === 0) {
            list.innerHTML = "<p>कोई सेव टेस्ट नहीं मिला।</p>";
            return;
        }
        list.innerHTML = tests.map((t, i) => `
            <div class="test-item">
                <span><b>${t.name}</b> (${t.data.length} Q)</span>
                <div>
                    <button class="btn" style="background:#27ae60; color:white; padding:5px 10px;" onclick="startTest(${i})">Start</button>
                    <button class="btn" style="background:#e74c3c; color:white; padding:5px 10px;" onclick="deleteTest(${i})">🗑️</button>
                </div>
            </div>
        `).join('');
    }

    document.getElementById('fileInput').onchange = async (e) => {
        const files = e.target.files;
        if(!files.length) return;
        document.getElementById('loader').classList.remove('hidden');
        let extracted = [];
        for(let i=0; i<files.length; i++) {
            document.getElementById('status-text').innerText = `स्कैनिंग पेज ${i+1}/${files.length}...`;
            document.getElementById('load-progress').style.width = ((i+1)/files.length * 100) + "%";
            const { data: { text } } = await Tesseract.recognize(files[i], 'hin+eng');
            const lines = text.split('\n').filter(l => l.trim().length > 10);
            for(let j=0; j<lines.length; j++) {
                if(lines[j].includes('?') || lines[j].length > 25) {
                    extracted.push({ t: lines[j], o: [lines[j+1], lines[j+2], lines[j+3], lines[j+4]].filter(x => x), a: lines[j+1] });
                    j += 4;
                }
            }
        }
        const tests = JSON.parse(localStorage.getItem('myTests') || '[]');
        tests.push({ name: "Test " + (tests.length + 1), data: extracted });
        localStorage.setItem('myTests', JSON.stringify(tests));
        location.reload();
    };

    function startTest(i) {
        const tests = JSON.parse(localStorage.getItem('myTests') || '[]');
        currentQuestions = tests[i].data;
        document.getElementById('test-title').innerText = tests[i].name;
        document.getElementById('dashboard').classList.add('hidden');
        document.getElementById('quiz-screen').classList.remove('hidden');
        loadQuestion();
    }

    function loadQuestion() {
        const q = currentQuestions[currentIdx];
        document.getElementById('q-text').innerText = `${currentIdx+1}. ${q.t}`;
        document.getElementById('quiz-progress').style.width = ((currentIdx+1)/currentQuestions.length * 100) + "%";
        const box = document.getElementById('options-box');
        box.innerHTML = "";
        q.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'opt'; b.innerText = opt;
            b.onclick = () => {
                const all = document.querySelectorAll('.opt');
                all.forEach(btn => btn.disabled = true);
                if(opt === q.a) { b.classList.add('correct'); score++; }
                else { b.classList.add('wrong'); all.forEach(btn => { if(btn.innerText === q.a) btn.classList.add('correct'); }); }
                document.getElementById('score-display').innerText = `स्कोर: ${score}`;
                setTimeout(() => {
                    currentIdx++;
                    if(currentIdx < currentQuestions.length) loadQuestion();
                    else showResult();
                }, 1200);
            };
            box.appendChild(b);
        });
    }

    function showResult() {
        document.getElementById('quiz-screen').classList.add('hidden');
        document.getElementById('result-screen').classList.remove('hidden');
        document.getElementById('user-greeting').innerText = `शानदार, ${document.getElementById('userName').value}!`;
        document.getElementById('final-score').innerText = `${score} / ${currentQuestions.length}`;
    }

    function deleteTest(i) {
        let tests = JSON.parse(localStorage.getItem('myTests') || '[]');
        tests.splice(i, 1);
        localStorage.setItem('myTests', JSON.stringify(tests));
        displaySavedTests();
    }

    displaySavedTests();
</script>
</body>
    </html>
